<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Story - Level 2</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%99%A5%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="bg"></div>
  <div id="particles" aria-hidden="true"></div>

  <main class="app">
    <section id="home-screen" class="screen">
      <div class="panel wide">
        <p class="label">LEVEL 2</p>
        <h1>Choose The Next Spot</h1>
        <p class="subtitle">three games, three places, one perfect day</p>

        <div class="level-grid">
          <button class="level-btn" data-level="1">
            <span class="level-art juice-art">
              <img src="logo_juice_palace.png" alt="" onerror="this.hidden=true" />
            </span>
            <span class="num">01</span>
            <span class="loc">Juice + Beach</span>
            <span class="loc-sub">recipe, then the perfect spot</span>
          </button>

          <button class="level-btn" data-level="2">
            <span class="level-art mountain-art">
              <img src="scene_mountain.png" alt="" onerror="this.hidden=true" />
            </span>
            <span class="num">02</span>
            <span class="loc">Mountain Picnic</span>
            <span class="loc-sub">picnic setup + card game</span>
          </button>

          <button class="level-btn" data-level="3">
            <span class="level-art cruise-art">
              <img src="scene_cruise.png" alt="" onerror="this.hidden=true" />
            </span>
            <span class="num">03</span>
            <span class="loc">Cruise Game</span>
            <span class="loc-sub">escape the coast guard</span>
          </button>
        </div>

        <p id="menu-message" class="message">Pick a spot to start.</p>
      </div>
    </section>

    <section id="game-screen" class="screen hidden">
      <div class="game-shell">
        <div class="game-top">
          <button id="back-btn" class="small-btn" type="button">Back</button>
          <div class="game-copy">
            <p id="game-title">LEVEL</p>
            <p id="game-hint">-</p>
          </div>
          <p id="status">Ready</p>
        </div>
        <canvas id="game-canvas" width="960" height="540"></canvas>
      </div>
    </section>

    <div id="popup" class="popup hidden">
      <div class="popup-card">
        <div class="popup-hearts" aria-hidden="true">♥ ♥ ♥</div>
        <h2 id="popup-title">LEVEL CLEARED</h2>
        <p id="popup-text"></p>
        <button id="popup-btn" class="pixel-btn" type="button">Continue</button>
      </div>
    </div>

    <section id="teaser-screen" class="screen hidden">
      <div class="panel">
        <p class="label">COMING SOON</p>
        <h1>Level 4</h1>
        <p class="subtitle">something is waiting on the track...</p>
        <div class="runner-teaser" aria-hidden="true">
          <div class="runner"></div>
          <div class="track"></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
