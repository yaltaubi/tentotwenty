<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One Qrt Closer to Forever</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%99%A5%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="bg"></div>
  <div id="particles" aria-hidden="true"></div>

  <main class="app">
    <section id="home-screen" class="screen">
      <div class="panel wide">
        <p class="label">choose our next spot</p>
        <h1>steaks got higher</h1>
        <p class="subtitle">A tiny 8-bit map of the usual chaos.</p>

        <div class="level-grid">
          <button class="level-btn" data-level="1" aria-label="Juice Palace memory game">
            <span class="level-art juice-art"><img src="logo_juice_palace.png" alt="Juice Palace" onerror="this.hidden=true" /></span>
            <span class="loc">نسبة وتناسب</span>
            <span class="loc-sub">save the order before he confidently ruins it</span>
          </button>

          <button class="level-btn" data-level="2" aria-label="Mountain spot setup game">
            <span class="level-art mountain-art"><img src="scene_mountain.png" alt="Mountain spot" onerror="this.hidden=true" /></span>
            <span class="loc">the parked promise</span>
            <span class="loc-sub">park Jojo, set the spot, keep it together</span>
          </button>

          <button class="level-btn" data-level="3" aria-label="Cruise digicam stealth game">
            <span class="level-art cruise-art"><img src="scene_cruise.png" alt="Cruise" onerror="this.hidden=true" /></span>
            <span class="loc">quiet evidence</span>
            <span class="loc-sub">take moments quietly, don’t get seen</span>
          </button>
        </div>

        <p id="menu-message" class="message">Pick a spot to start.</p>
      </div>
    </section>

    <section id="game-screen" class="screen hidden">
      <div class="game-shell">
        <div class="game-top">
          <button id="back-btn" class="small-btn" type="button">Back</button>
          <div class="game-copy">
            <p id="game-title">spot</p>
            <p id="game-hint">Ready.</p>
          </div>
          <p id="status">Ready</p>
        </div>
        <canvas id="game-canvas" width="960" height="540"></canvas>
      </div>
    </section>

    <div id="popup" class="popup hidden">
      <div class="popup-card">
        <div class="popup-hearts" aria-hidden="true">♥ ♥ ♥</div>
        <h2 id="popup-title">saved</h2>
        <p id="popup-text"></p>
        <button id="popup-btn" class="pixel-btn" type="button">Continue</button>
      </div>
    </div>

    <section id="teaser-screen" class="screen hidden">
      <div class="panel">
        <p class="label">all spots cleared</p>
        <h1>the map folds itself</h1>
        <p class="subtitle">RAV4 and Jojo are already parked for the next one.</p>
      </div>
    </section>
  </main>
</body>
</html>
