<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Level 2</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>❤️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="background-layer"></div>
  <div class="background-overlay"></div>

  <main class="app">
    <section id="home-screen" class="screen">
      <div class="pixel-card wide">
        <p class="label">LEVEL 2</p>
        <h1>CHOOSE YOUR SPOT</h1>
        <p class="subtitle">all levels available</p>

        <div class="level-grid">
          <button class="level-btn" data-level="1">
            <span>01</span>
            Juice + Beach
          </button>

          <button class="level-btn" data-level="2">
            <span>02</span>
            Mountain Hideout
          </button>

          <button class="level-btn" data-level="3">
            <span>03</span>
            Alam Cruise
          </button>
        </div>

        <p id="menu-message" class="message">Pick a spot to start.</p>
      </div>
    </section>

    <section id="game-screen" class="screen hidden">
      <div class="game-shell">
        <div class="game-top">
          <button id="back-btn" class="small-btn">BACK</button>
          <div>
            <p id="game-title">LEVEL</p>
            <p id="game-hint">hint</p>
          </div>
          <p id="status">♥ ♥ ♥</p>
        </div>

        <canvas id="game-canvas" width="960" height="540"></canvas>
      </div>
    </section>

    <div id="popup" class="popup hidden">
      <div class="popup-card">
        <h2 id="popup-title">LEVEL CLEARED</h2>
        <p id="popup-text"></p>
        <button id="popup-btn" class="pixel-btn">CONTINUE</button>
      </div>
    </div>

    <section id="teaser-screen" class="screen hidden">
      <div class="pixel-card">
        <p class="label">COMING SOON</p>
        <h1>LEVEL 4</h1>
        <p class="subtitle">something is waiting on the track...</p>

        <div class="runner-teaser">
          <div class="runner"></div>
          <div class="track"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
