<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Level 2</title>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>❤️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="background-layer"></div>
  <div class="background-overlay"></div>

  <main class="app">

    <!-- INGREDIENT QUESTION -->
    <section id="quiz-screen" class="screen active">
      <div class="pixel-card">
        <p class="level-label">LEVEL 2</p>
        <h1>نسبة وتناسب</h1>
        <p class="question">What are the ingredients of نسبة وتناسب?</p>

        <div id="options" class="options"></div>

        <button id="submit-quiz" class="pixel-btn">SUBMIT</button>
        <p id="quiz-message" class="message"></p>
      </div>
    </section>

    <!-- LEVEL MENU -->
    <section id="level-screen" class="screen hidden">
      <div class="pixel-card wide">
        <p class="level-label">CHOOSE YOUR SPOT</p>

        <div class="level-grid">
          <button class="level-btn" data-level="1">
            <span>01</span>
            Beach Drive
          </button>

          <button class="level-btn" data-level="2">
            <span>02</span>
            Mountain Chill
          </button>

          <button class="level-btn" data-level="3">
            <span>03</span>
            Alam Cruise
          </button>
        </div>

        <p id="level-message" class="message">Pick any spot.</p>
      </div>
    </section>

    <!-- GAME -->
    <section id="game-screen" class="screen hidden">
      <div class="game-wrap">
        <div class="game-top">
          <button id="back-btn" class="small-btn">BACK</button>
          <p id="game-title">LEVEL</p>
          <p id="game-hint">Click around to play</p>
        </div>

        <canvas id="game-canvas" width="960" height="540"></canvas>

        <div class="mobile-controls">
          <button data-key="ArrowLeft">◀</button>
          <button data-key="ArrowUp">▲</button>
          <button data-key="ArrowDown">▼</button>
          <button data-key="ArrowRight">▶</button>
        </div>
      </div>
    </section>

    <!-- LEVEL COMPLETE POPUP -->
    <div id="complete-popup" class="popup hidden">
      <div class="popup-card">
        <h2 id="complete-title">LEVEL CLEARED</h2>
        <p id="complete-text"></p>
        <button id="continue-btn" class="pixel-btn">CONTINUE</button>
      </div>
    </div>

    <!-- FINAL TEASER -->
    <section id="teaser-screen" class="screen hidden">
      <div class="pixel-card">
        <p class="level-label">COMING SOON</p>
        <h1>LEVEL 4</h1>
        <p class="question">Something is waiting on the track...</p>

        <div class="runner-teaser">
          <div class="runner"></div>
          <div class="track-line"></div>
        </div>

        <p class="message">not everything is a drive. some things are a run.</p>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
