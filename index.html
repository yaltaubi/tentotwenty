<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Story — Level 2</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>❤️</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --midnight: #0b0615;
      --deep:     #150a20;
      --rose:     #8b1a4a;
      --crimson:  #c9184a;
      --blush:    #ff85a1;
      --petal:    #ffb3c6;
      --gold:     #ffd166;
      --cream:    #fff4e6;
      --mist:     rgba(255,244,230,0.08);
      --glow:     0 0 18px rgba(255,180,140,0.25), 0 0 40px rgba(180,30,70,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--midnight);
      color: var(--cream);
      font-family: 'Press Start 2P', monospace;
    }

    /* ─── BACKGROUND ─── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 30% 20%, #2a0d3a 0%, #0b0615 50%),
                  radial-gradient(ellipse at 80% 75%, #1f0420 0%, transparent 55%);
    }
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,209,102,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 35%, rgba(255,181,193,0.5) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 8%, rgba(255,209,102,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 28%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 12%, rgba(255,209,102,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 60%, rgba(255,181,193,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 55%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 72%, rgba(255,209,102,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 63% 82%, rgba(255,181,193,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 68%, rgba(255,255,255,0.3) 0%, transparent 100%);
      animation: starTwinkle 4s ease-in-out infinite alternate;
    }
    @keyframes starTwinkle {
      from { opacity: 0.7; }
      to   { opacity: 1; }
    }

    /* ─── PARTICLES ─── */
    #particles {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none; overflow: hidden;
    }
    .particle {
      position: absolute;
      font-size: 12px;
      opacity: 0;
      animation: floatUp linear infinite;
      user-select: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) rotate(0deg) scale(0.6); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-10vh) rotate(360deg) scale(1); opacity: 0; }
    }

    /* ─── APP ─── */
    .app {
      position: relative; z-index: 2;
      width: 100vw; height: 100vh;
    }

    .screen {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 1; transition: opacity 0.4s ease;
    }
    .screen.hidden   { display: none !important; }
    .screen.fade-out { opacity: 0; }

    /* ─── CARD ─── */
    .card {
      width: min(92vw, 780px);
      padding: 36px 32px;
      text-align: center;
      background: linear-gradient(160deg, rgba(22,8,34,0.95) 0%, rgba(12,4,20,0.97) 100%);
      border: 2px solid rgba(255,209,102,0.45);
      border-radius: 2px;
      box-shadow:
        0 0 0 1px rgba(255,181,193,0.1),
        inset 0 1px 0 rgba(255,209,102,0.12),
        var(--glow),
        0 40px 100px rgba(0,0,0,0.7);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,209,102,0.6), rgba(255,181,193,0.4), transparent);
    }
    .card.wide { width: min(94vw, 960px); }

    /* ─── HOME SCREEN ─── */
    .label {
      font-size: 0.55rem; letter-spacing: 0.15em;
      color: var(--blush); margin-bottom: 14px;
      opacity: 0.8;
    }
    .label::before, .label::after {
      content: '♥'; margin: 0 8px; color: var(--crimson); font-size: 0.5rem;
    }

    h1 {
      font-size: clamp(0.9rem, 3.5vw, 2rem);
      color: var(--gold);
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255,209,102,0.4);
      line-height: 1.4;
    }

    .subtitle {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.2rem);
      color: var(--petal); margin-bottom: 4px;
      opacity: 0.85;
    }
    .message {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 1rem;
      color: var(--cream);
      opacity: 0.7;
      letter-spacing: 0.05em;
    }

    /* ─── LEVEL GRID ─── */
    .level-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 28px 0 20px;
    }

    .level-btn {
      min-height: 155px;
      padding: 22px 16px;
      border: 2px solid rgba(255,209,102,0.35);
      background: linear-gradient(160deg, rgba(50,10,28,0.9), rgba(18,5,25,0.95));
      color: var(--cream);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      cursor: pointer;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.5);
    }
    .level-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(255,209,102,0.06), transparent);
      opacity: 0; transition: opacity 0.25s;
    }
    .level-btn:hover { transform: translateY(-3px); border-color: rgba(255,209,102,0.7); box-shadow: 0 8px 24px rgba(180,30,70,0.35), inset 0 -3px 0 rgba(0,0,0,0.4); }
    .level-btn:hover::after { opacity: 1; }
    .level-btn:active { transform: translateY(-1px); }

    .level-btn .num {
      display: block;
      font-size: 1.8rem;
      color: var(--gold);
      margin-bottom: 14px;
      text-shadow: 0 0 12px rgba(255,209,102,0.5);
    }
    .level-btn .loc { font-size: 0.6rem; line-height: 1.6; }
    .level-btn .loc-sub {
      display: block; margin-top: 6px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.7rem;
      color: var(--blush); opacity: 0.8;
    }
    .level-btn.done {
      border-color: rgba(201,24,74,0.7);
      background: linear-gradient(160deg, rgba(80,10,35,0.9), rgba(30,5,18,0.95));
    }
    .level-btn.done .num { color: var(--crimson); }
    .level-btn.done::before {
      content: '✓';
      position: absolute; top: 8px; right: 10px;
      color: var(--crimson); font-size: 0.5rem; opacity: 0.9;
    }

    /* ─── GAME SHELL ─── */
    .game-shell { width: min(96vw, 1080px); }
    .game-top {
      display: grid;
      grid-template-columns: 100px 1fr 120px;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }
    #game-title {
      font-size: 0.62rem;
      color: var(--gold);
      margin-bottom: 5px;
      letter-spacing: 0.1em;
    }
    #game-hint {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(0.85rem, 1.8vw, 1.1rem);
      color: var(--petal);
      line-height: 1.4;
    }
    #status {
      text-align: right;
      color: var(--crimson);
      font-size: 0.62rem;
    }

    /* ─── CANVAS ─── */
    #game-canvas {
      width: 100%;
      aspect-ratio: 16/9;
      image-rendering: pixelated;
      border: 3px solid rgba(255,209,102,0.4);
      background: #111;
      cursor: pointer;
      display: block;
      box-shadow:
        0 0 0 1px rgba(255,181,193,0.1),
        0 0 30px rgba(180,30,70,0.25),
        0 0 60px rgba(120,10,40,0.2),
        0 30px 80px rgba(0,0,0,0.6);
      animation: canvasGlow 3s ease-in-out infinite alternate;
    }
    @keyframes canvasGlow {
      from { box-shadow: 0 0 0 1px rgba(255,181,193,0.1), 0 0 25px rgba(180,30,70,0.2), 0 30px 80px rgba(0,0,0,0.6); }
      to   { box-shadow: 0 0 0 1px rgba(255,181,193,0.15), 0 0 40px rgba(180,30,70,0.35), 0 0 80px rgba(255,209,102,0.08), 0 30px 80px rgba(0,0,0,0.6); }
    }
    #game-canvas.shake {
      animation: shake 0.45s ease, canvasGlow 3s ease-in-out infinite alternate;
    }
    @keyframes shake {
      0%,100%{ transform: translateX(0); }
      20%    { transform: translateX(-6px); }
      40%    { transform: translateX(6px); }
      60%    { transform: translateX(-4px); }
      80%    { transform: translateX(4px); }
    }

    /* ─── BUTTONS ─── */
    .pixel-btn, .small-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.65rem;
      border: 2px solid var(--gold);
      cursor: pointer;
      background: linear-gradient(160deg, rgba(60,15,30,0.95), rgba(25,5,18,0.98));
      color: var(--gold);
      padding: 12px 20px;
      border-radius: 2px;
      transition: all 0.2s ease;
      letter-spacing: 0.08em;
    }
    .pixel-btn:hover, .small-btn:hover {
      background: linear-gradient(160deg, rgba(100,25,50,0.95), rgba(50,10,30,0.98));
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(180,30,70,0.4);
    }
    .pixel-btn { font-size: 0.7rem; padding: 14px 28px; }

    /* ─── POPUP ─── */
    .popup {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background: rgba(5,1,10,0.78);
      backdrop-filter: blur(4px);
    }
    .popup-card {
      width: min(90vw, 500px);
      padding: 40px 36px;
      text-align: center;
      background: linear-gradient(160deg, rgba(28,6,20,0.98), rgba(12,2,16,0.99));
      border: 2px solid rgba(255,209,102,0.5);
      border-radius: 2px;
      box-shadow: 0 0 60px rgba(180,30,70,0.35), 0 40px 100px rgba(0,0,0,0.8);
      position: relative;
      overflow: hidden;
      animation: popupIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popupIn {
      from { transform: scale(0.8) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    .popup-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,209,102,0.7), transparent);
    }
    .popup-hearts {
      font-size: 1.8rem;
      margin-bottom: 16px;
      animation: heartBeat 1.2s ease-in-out infinite;
    }
    @keyframes heartBeat {
      0%,100%{ transform: scale(1); }
      50%    { transform: scale(1.15); }
    }
    .popup-card h2 {
      font-size: 0.85rem;
      color: var(--gold);
      margin-bottom: 16px;
      letter-spacing: 0.1em;
      text-shadow: 0 0 15px rgba(255,209,102,0.4);
    }
    .popup-card p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.15rem;
      line-height: 1.6;
      color: var(--petal);
      margin-bottom: 28px;
    }

    /* ─── TEASER ─── */
    .runner-teaser {
      height: 100px; width: min(380px, 80vw);
      margin: 28px auto 0; position: relative;
    }
    .runner {
      position: absolute; left: 30px; bottom: 28px;
      width: 24px; height: 36px;
      background: var(--blush);
      box-shadow: 0 8px 0 var(--blush), 16px 8px 0 var(--blush),
                  6px 24px 0 var(--crimson), 20px 24px 0 var(--crimson);
      animation: runHint 0.65s infinite steps(2);
    }
    .track {
      position: absolute; left: 0; right: 0; bottom: 18px;
      height: 3px;
      background: repeating-linear-gradient(
        to right, rgba(255,209,102,0.6) 0 25px, transparent 25px 38px
      );
    }
    @keyframes runHint {
      from { transform: translateX(0); }
      to   { transform: translateX(24px); }
    }

    /* ─── CANVAS CLICK RIPPLE ─── */
    .ripple {
      position: absolute; pointer-events: none;
      width: 40px; height: 40px; margin: -20px;
      border: 2px solid var(--blush);
      border-radius: 50%;
      animation: rippleOut 0.5s ease-out forwards;
      z-index: 5;
    }
    @keyframes rippleOut {
      from { transform: scale(0.2); opacity: 0.9; }
      to   { transform: scale(2); opacity: 0; }
    }

    /* ─── GAME HUD ─── */
    .hearts-hud { display: inline-flex; gap: 4px; }
    .heart-icon {
      display: inline-block; font-size: 0.9rem;
      transition: all 0.3s ease;
    }
    .heart-icon.lost { opacity: 0.2; transform: scale(0.8); }

    body.game-mode .bg {
      filter: brightness(0.4) saturate(0.6);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      .level-grid { grid-template-columns: 1fr; }
      .game-top   { grid-template-columns: 1fr; text-align: center; }
      #status     { text-align: center; }
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div id="particles"></div>

<main class="app">

  <!-- HOME -->
  <section id="home-screen" class="screen">
    <div class="card wide">
      <p class="label">LEVEL 2</p>
      <h1>CHOOSE YOUR SPOT</h1>
      <p class="subtitle">three places, one perfect day</p>
      <div class="level-grid">
        <button class="level-btn" data-level="1">
          <span class="num">01</span>
          <span class="loc">Juice + Beach<span class="loc-sub">قصر العصائر</span></span>
        </button>
        <button class="level-btn" data-level="2">
          <span class="num">02</span>
          <span class="loc">Mountain Hideout<span class="loc-sub">our secret</span></span>
        </button>
        <button class="level-btn" data-level="3">
          <span class="num">03</span>
          <span class="loc">Alam Cruise<span class="loc-sub">عالم</span></span>
        </button>
      </div>
      <p id="menu-message" class="message">Pick a spot to start.</p>
    </div>
  </section>

  <!-- GAME -->
  <section id="game-screen" class="screen hidden">
    <div class="game-shell">
      <div class="game-top">
        <button id="back-btn" class="small-btn">← BACK</button>
        <div>
          <p id="game-title">LEVEL</p>
          <p id="game-hint">—</p>
        </div>
        <p id="status">
          <span class="hearts-hud">
            <span class="heart-icon">♥</span>
            <span class="heart-icon">♥</span>
            <span class="heart-icon">♥</span>
          </span>
        </p>
      </div>
      <canvas id="game-canvas" width="960" height="540"></canvas>
    </div>
  </section>

  <!-- POPUP -->
  <div id="popup" class="popup hidden">
    <div class="popup-card">
      <div class="popup-hearts">♥ ♥ ♥</div>
      <h2 id="popup-title">LEVEL CLEARED</h2>
      <p id="popup-text"></p>
      <button id="popup-btn" class="pixel-btn">CONTINUE ›</button>
    </div>
  </div>

  <!-- TEASER -->
  <section id="teaser-screen" class="screen hidden">
    <div class="card">
      <p class="label">COMING SOON</p>
      <h1>LEVEL 4</h1>
      <p class="subtitle">something is waiting on the track...</p>
      <div class="runner-teaser">
        <div class="runner"></div>
        <div class="track"></div>
      </div>
    </div>
  </section>

</main>

<script>
// ─────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────
const SYMBOLS = ['♥','♥','♥','✿','·','♡','°'];
const pContainer = document.getElementById('particles');

function spawnParticle() {
  const el = document.createElement('span');
  el.className = 'particle';
  el.textContent = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
  el.style.left   = Math.random() * 100 + 'vw';
  el.style.bottom = '-30px';
  const dur = 8 + Math.random() * 14;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay   = Math.random() * 4 + 's';
  el.style.fontSize = (8 + Math.random() * 10) + 'px';
  el.style.color = ['#ff85a1','#ffd166','#ffb3c6','#c9184a','#fff4e6'][Math.floor(Math.random()*5)];
  el.style.opacity = (0.3 + Math.random() * 0.5).toString();
  pContainer.appendChild(el);
  setTimeout(() => el.remove(), (dur + 4) * 1000);
}
setInterval(spawnParticle, 600);
for (let i = 0; i < 12; i++) setTimeout(spawnParticle, i * 200);

// ─────────────────────────────────────────────
//  CANVAS CLICK RIPPLE
// ─────────────────────────────────────────────
const canvasEl = document.getElementById('game-canvas');
canvasEl.addEventListener('click', e => {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = e.offsetX / canvasEl.offsetWidth * 100 + '%';
  r.style.top  = e.offsetY / canvasEl.offsetHeight * 100 + '%';
  canvasEl.parentElement.style.position = 'relative';
  canvasEl.parentElement.appendChild(r);
  setTimeout(() => r.remove(), 500);
});

// ─────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────
const homeScreen   = document.getElementById('home-screen');
const gameScreen   = document.getElementById('game-screen');
const teaserScreen = document.getElementById('teaser-screen');
const canvas       = document.getElementById('game-canvas');
const ctx          = canvas.getContext('2d');
const gameTitle    = document.getElementById('game-title');
const gameHint     = document.getElementById('game-hint');
const statusEl     = document.getElementById('status');
const popup        = document.getElementById('popup');
const popupTitle   = document.getElementById('popup-title');
const popupText    = document.getElementById('popup-text');
const popupBtn     = document.getElementById('popup-btn');
const backBtn      = document.getElementById('back-btn');
const menuMsg      = document.getElementById('menu-message');
const levelBtns    = document.querySelectorAll('.level-btn');
const heartIcons   = document.querySelectorAll('.heart-icon');

let currentLevel = 1;
let completed    = new Set();
let frameId      = null;
let lastTime     = 0;
let levelDone    = false;
let globalTime   = 0;  // for animations

// ─────────────────────────────────────────────
//  HUD HELPERS
// ─────────────────────────────────────────────
function setHints(text) { gameHint.textContent = text; }
function setStatus(text) {
  // rebuild hearts display or raw text
  if (text.startsWith('LIVES')) {
    const lives = parseInt(text.split(' ')[1]) || 0;
    const heartHTML = '<span class="hearts-hud">' +
      [0,1,2].map(i => `<span class="heart-icon${i >= lives ? ' lost' : ''}">♥</span>`).join('') +
      '</span>';
    statusEl.innerHTML = heartHTML;
  } else {
    statusEl.innerHTML = `<span style="color:var(--blush);font-size:0.62rem">${text}</span>`;
  }
}

function shakeCanvas() {
  canvas.classList.remove('shake');
  void canvas.offsetWidth;
  canvas.classList.add('shake');
  setTimeout(() => canvas.classList.remove('shake'), 450);
}

// ─────────────────────────────────────────────
//  MENU
// ─────────────────────────────────────────────
levelBtns.forEach(btn => {
  btn.addEventListener('click', () => startLevel(Number(btn.dataset.level)));
});

backBtn.addEventListener('click', () => {
  stopLoop();
  gameScreen.classList.add('hidden');
  homeScreen.classList.remove('hidden');
  document.body.classList.remove('game-mode');
  updateMenu();
});

popupBtn.addEventListener('click', () => {
  popup.classList.add('hidden');
  completed.add(currentLevel);
  if (completed.size >= 3) {
    gameScreen.classList.add('hidden');
    teaserScreen.classList.remove('hidden');
    return;
  }
  gameScreen.classList.add('hidden');
  homeScreen.classList.remove('hidden');
  document.body.classList.remove('game-mode');
  updateMenu();
});

function updateMenu() {
  levelBtns.forEach(btn => {
    btn.classList.toggle('done', completed.has(Number(btn.dataset.level)));
  });
  menuMsg.textContent = completed.size
    ? `${completed.size}/3 spots cleared ♥`
    : 'Pick a spot to start.';
}

// ─────────────────────────────────────────────
//  LEVELS
// ─────────────────────────────────────────────
let beach = {}, mountain = {}, cruise = {};

function startLevel(level) {
  currentLevel = level;
  levelDone    = false;
  globalTime   = 0;

  homeScreen.classList.add('hidden');
  teaserScreen.classList.add('hidden');
  gameScreen.classList.remove('hidden');
  document.body.classList.add('game-mode');

  canvas.onclick = null;
  if (level === 1) setupBeach();
  if (level === 2) setupMountain();
  if (level === 3) setupCruise();

  stopLoop();
  startLoop();
}

// ─────────────────────────────────────────────
//  LEVEL 1 — JUICE + BEACH
// ─────────────────────────────────────────────
const INGREDIENT_COLORS = {
  Grape:'#7B2D8B', Passion:'#FF6B35', Pomegranate:'#C9184A',
  Berry:'#6B2D5E', Orange:'#FF8C00', Mango:'#FFB347',
  Mint:'#228B22', Lemon:'#FFD700', Peach:'#FFCBA4', Vanilla:'#F3E5AB'
};

function setupBeach() {
  gameTitle.textContent = '01 ♥ JUICE + BEACH';
  beach = {
    phase: 'juice', timer: 22, selected: [],
    message: 'Pick the perfect ingredients at Juice Palace.',
    ingredients: [
      { name:'Grape',        correct:true,  x:95,  y:340 },
      { name:'Passion',      correct:true,  x:215, y:340 },

function beachClick(e) {
  const p = point(e);

  if (beach.phase === 'juice') {
    beach.ingredients.forEach(item => {
      if (distance(p.x, p.y, item.x, item.y) < 46) {
        if (beach.selected.includes(item.name)) {
          beach.selected = beach.selected.filter(x => x !== item.name);
        } else {
          beach.selected.push(item.name);
        }
      }
    });

    const correct  = beach.ingredients.filter(i => i.correct).map(i => i.name).sort().join(',');
    const selected = [...beach.selected].sort().join(',');
    const count    = beach.selected.length;

    if (selected === correct) {
      beach.phase   = 'spot';
      beach.timer   = 18;
      beach.message = 'Now find the best beach spot before someone takes it!';
      setStatus('TIME 18');
    } else {
      setStatus(`PICKED ${count}/5`);
    }
    setHints(beach.message);
    return;
  }

  if (beach.phase === 'spot') {
    const spot = beach.spots.find(s => inside(p, s));
    if (!spot) { setHints('That is not a spot — look closer.'); return; }
    if (spot.good) {
      winLevel('Juice secured. The best beach spot is yours. ♥');
    } else {
      spot.taken = true;
      setHints('Too basic. Find a better spot!');
      shakeCanvas();
    }
  }
}

// ─────────────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────────────
function startLoop() {
  lastTime = performance.now();
  function loop(time) {
    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;
    globalTime += dt;
    update(dt);
    draw();
    frameId = requestAnimationFrame(loop);
  }
  loop(lastTime);
}
function stopLoop() {
  if (frameId) cancelAnimationFrame(frameId);
  frameId = null;
}

function update(dt) {
  if (levelDone) return;

  if (currentLevel === 1 && beach.phase === 'spot') {
    beach.timer -= dt;
    setStatus(`TIME ${Math.ceil(beach.timer)}`);
    if (beach.timer <= 0) {
      setHints('Someone took the best spot. Restarting...');
      shakeCanvas();
      setTimeout(setupBeach, 1000);
    }
  }

  if (currentLevel === 2) {
    mountain.guardX += mountain.guardDir * 80 * dt;
    if (mountain.guardX > 820) mountain.guardDir = -1;
    if (mountain.guardX < 100) mountain.guardDir = 1;

    if (mountain.cooldown > 0) mountain.cooldown -= dt;
    if (mountain.flashAlpha > 0) mountain.flashAlpha -= dt * 1.5;

    const lookingAtThem = mountain.guardX > 540 && mountain.guardX < 808;
    const riskyProgress = mountain.smoke > 0 || mountain.kiss > 0;

    if (lookingAtThem && riskyProgress && mountain.cooldown <= 0) {
      mountain.lives--;
      mountain.cooldown = 2.2;
      mountain.flashAlpha = 1;
      setHints('Coast Guard noticed. Act normal!');
      setStatus(`LIVES ${mountain.lives}`);
      shakeCanvas();
      if (mountain.lives <= 0) {
        setHints('Caught. Restarting...');
        setTimeout(setupMountain, 1100);
      }
    }

    if (mountain.fries && mountain.steak && mountain.photos >= 4 &&
        mountain.smoke >= 100 && mountain.kiss >= 100) {
      winLevel('Food, photos, smoke, kisses — no witnesses. ♥');
    }
  }
}

// ─────────────────────────────────────────────
//  DRAW DISPATCHER
// ─────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, 960, 540);
  if (currentLevel === 1) drawBeach();
  if (currentLevel === 2) drawMountain();
  if (currentLevel === 3) drawCruise();
}

// ─────────────────────────────────────────────
//  DRAW — LEVEL 1: BEACH
// ─────────────────────────────────────────────
function drawBeach() {
  // Sky gradient (sunset)
  const sky = ctx.createLinearGradient(0, 0, 0, 270);
  sky.addColorStop(0, '#1a0530');
  sky.addColorStop(0.4, '#5c1a4a');
  sky.addColorStop(0.7, '#d4663a');
  sky.addColorStop(1, '#f0964a');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, 960, 270);

  // Sun
  drawSunset(830, 95, globalTime);

  // Sea
  const sea = ctx.createLinearGradient(0, 220, 0, 390);
  sea.addColorStop(0, '#1a6080');
  sea.addColorStop(0.5, '#0e3d5c');
  sea.addColorStop(1, '#09263d');
  ctx.fillStyle = sea;
  ctx.fillRect(0, 220, 960, 170);

  // Animated waves on sea
  for (let wv = 0; wv < 3; wv++) {
    ctx.strokeStyle = `rgba(180,230,255,${0.18 - wv * 0.04})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let x = 0; x <= 960; x += 8) {
      const y = 265 + wv * 30 + Math.sin((x * 0.018) + globalTime * 1.2 + wv * 2) * 6;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Horizon shimmer
  ctx.fillStyle = 'rgba(255,220,120,0.12)';
  ctx.fillRect(0, 215, 960, 12);

  // Sandy beach
  const sand = ctx.createLinearGradient(0, 390, 0, 540);
  sand.addColorStop(0, '#c89850');
  sand.addColorStop(1, '#8a5e28');
  ctx.fillStyle = sand;
  ctx.fillRect(0, 388, 960, 152);

  // Sand texture dots
  ctx.fillStyle = 'rgba(255,220,140,0.2)';
  for (let i = 0; i < 80; i++) {
    const sx = ((i * 137) % 960);
    const sy = 400 + ((i * 71) % 138);
    ctx.fillRect(sx, sy, 2, 1);
  }

  // Palm trees
  drawPalm(60, 340, globalTime);
  drawPalm(880, 340, globalTime, true);

  // Juice Palace
  drawJuicePalace();

  // Ingredients or spots
  if (beach.phase === 'juice') {
    beach.ingredients.forEach(drawIngredient);
    // Progress hint below ingredients
    const cnt = beach.selected.length;
    drawPill(350, 495, `Selected: ${cnt} / 5`, cnt === 5 ? '#7cff9b' : '#ffd166');
  }

  if (beach.phase === 'spot') {
    beach.spots.forEach(drawSpot);
    drawTimerBar(36, 30, beach.timer, 18);
  }
}

function drawSunset(cx, cy, t) {
  // Rays
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 + t * 0.08;
    const len   = 55 + Math.sin(t * 0.5 + i) * 10;
    ctx.strokeStyle = `rgba(255,220,80,${0.08 + Math.sin(t + i) * 0.04})`;
    ctx.lineWidth = 14;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * 28, cy + Math.sin(angle) * 28);
    ctx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
    ctx.stroke();
  }
  // Core
  const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
  rg.addColorStop(0, '#fff5a0');
  rg.addColorStop(0.5, '#ffcc44');
  rg.addColorStop(1, '#ff8800');
  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, Math.PI * 2);
  ctx.fill();
  // Glow
  ctx.fillStyle = 'rgba(255,180,60,0.12)';
  ctx.beginPath();
  ctx.arc(cx, cy, 60, 0, Math.PI * 2);
  ctx.fill();
}

function drawPalm(x, y, t, flip = false) {
  const dir = flip ? -1 : 1;
  // Trunk
  ctx.strokeStyle = '#7a4a1e';
  ctx.lineWidth = 7;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x + dir * 15, y - 60, x + dir * 10, y - 100, x + dir * 25, y - 140);
  ctx.stroke();
  // Leaves
  const leaves = [[-30, -18], [20, -25], [35, -8], [-15, 10], [15, 12]];
  leaves.forEach(([dx, dy]) => {
    ctx.strokeStyle = '#2d7a3a';
    ctx.lineWidth = 4;
    ctx.beginPath();
    const lx = x + dir * 25;
    const ly = y - 140;
    ctx.moveTo(lx, ly);
    ctx.quadraticCurveTo(
      lx + dir * dx * 0.5 + Math.sin(t * 0.8) * 4, ly + dy * 0.5,
      lx + dir * dx + Math.sin(t * 0.8 + dx) * 5, ly + dy
    );
    ctx.stroke();
  });
  // Coconuts
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(x + dir * 22 - 5, y - 147, 8, 8);
}

  ctx.fillStyle = `rgba(255,200,80,${0.5 + Math.sin(globalTime) * 0.15})`;
  ctx.beginPath(); ctx.arc(445, 175, 12, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = `rgba(255,230,120,${0.15 + Math.sin(globalTime) * 0.05})`;

function drawIngredient(item) {
  const sel  = beach.selected.includes(item.name);
  const col  = INGREDIENT_COLORS[item.name] || '#888';

  // Card
  ctx.fillStyle = sel ? 'rgba(124,255,155,0.2)' : 'rgba(255,244,230,0.07)';
  ctx.fillRect(item.x - 42, item.y - 38, 84, 72);

  ctx.strokeStyle = sel ? '#7cff9b' : (item.correct ? '#ffd166' : '#666');
  ctx.lineWidth = sel ? 2.5 : 1.5;
  ctx.strokeRect(item.x - 42, item.y - 38, 84, 72);

  // Color swatch
  ctx.fillStyle = col;
  ctx.fillRect(item.x - 28, item.y - 26, 56, 34);

  // Shine on swatch
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fillRect(item.x - 28, item.y - 26, 56, 10);

  // Name
  ctx.fillStyle = sel ? '#7cff9b' : '#fff4e6';
  ctx.font = `${sel ? 'bold ' : ''}9px monospace`;
  const nm = item.name.length > 7 ? item.name.slice(0, 6) + '…' : item.name;
  ctx.fillText(nm, item.x - 20, item.y + 25);

  // Checkmark if selected
  if (sel) {
    ctx.fillStyle = '#7cff9b';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('✓', item.x + 22, item.y - 24);
  }
}

function drawSpot(s) {
  if (s.taken) {
    ctx.fillStyle = 'rgba(100,100,100,0.4)';
    ctx.fillRect(s.x, s.y, s.w, s.h);
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.fillText('TAKEN', s.x + s.w/2 - 22, s.y + s.h/2 + 4);
    return;
  }

  if (s.good) {
    // Glowing good spot
    const pulse = 0.7 + Math.sin(globalTime * 2.5) * 0.3;
    ctx.fillStyle = `rgba(255,209,102,${pulse * 0.3})`;
    ctx.fillRect(s.x - 6, s.y - 6, s.w + 12, s.h + 12);
    ctx.fillStyle = 'rgba(255,209,102,0.25)';
    ctx.fillRect(s.x, s.y, s.w, s.h);
    ctx.strokeStyle = '#ffd166';
    ctx.lineWidth = 3;
    ctx.strokeRect(s.x, s.y, s.w, s.h);
    // Beach umbrella icon
    ctx.fillStyle = '#c9184a';
    ctx.fillRect(s.x + 35, s.y + 5, 45, 4);
    ctx.strokeStyle = '#c9184a';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(s.x + 57, s.y + 9); ctx.lineTo(s.x + 57, s.y + 40); ctx.stroke();
    ctx.fillStyle = 'rgba(255,200,100,0.8)';
    ctx.fillRect(s.x + 5, s.y + 45, s.w - 10, 8);
    ctx.fillStyle = '#ffd166';
    ctx.font = 'bold 9px monospace';
    ctx.fillText('BEST SPOT', s.x + 14, s.y + 36);
  } else {
    ctx.fillStyle = 'rgba(150,150,150,0.15)';
    ctx.fillRect(s.x, s.y, s.w, s.h);
    ctx.strokeStyle = 'rgba(200,200,200,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(s.x, s.y, s.w, s.h);
    ctx.fillStyle = 'rgba(200,200,200,0.5)';
    ctx.font = '9px monospace';
    ctx.fillText(s.label, s.x + 12, s.y + s.h/2 + 4);
  }
}

function drawTimerBar(x, y, value, max) {
  const frac = Math.max(0, value / max);
  const urgency = value < 6;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(x - 4, y - 4, 210, 32);

  const col = urgency
    ? `hsl(${(Math.sin(globalTime * 8) * 0.5 + 0.5) * 20},100%,55%)`
    : `hsl(${30 + frac * 30},100%,60%)`;
  ctx.fillStyle = col;
  ctx.fillRect(x, y, 202 * frac, 24);

  ctx.strokeStyle = 'rgba(255,209,102,0.6)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, 202, 24);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(`TIME ${Math.ceil(value)}`, x + 68, y + 17);
}

function drawPill(cx, y, text, color = '#ffd166') {
  const w = text.length * 8 + 24;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(cx - w/2, y - 14, w, 22);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(cx - w/2, y - 14, w, 22);
  ctx.fillStyle = color;
  ctx.font = '10px monospace';
  ctx.fillText(text, cx - w/2 + 12, y + 4);
}

// ─────────────────────────────────────────────
//  DRAW — LEVEL 2: MOUNTAIN
// ─────────────────────────────────────────────
function drawMountain() {
  // Dusk sky
  const sky = ctx.createLinearGradient(0, 0, 0, 280);
  sky.addColorStop(0, '#0a0218');
  sky.addColorStop(0.5, '#1a0538');
  sky.addColorStop(1, '#4a1228');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, 960, 540);

  // Stars
  ctx.fillStyle = 'rgba(255,240,200,0.8)';
  const stars = [[80,30],[200,55],[350,20],[480,45],[600,18],[720,40],[850,25],[130,80],[300,72],[550,62],[750,70],[900,50]];
  stars.forEach(([sx, sy]) => {
    const twinkle = 0.5 + Math.sin(globalTime * 1.5 + sx * 0.1) * 0.4;
    ctx.globalAlpha = twinkle;
    ctx.fillRect(sx, sy, 2, 2);
  });
  ctx.globalAlpha = 1;

  // Moon
  drawMoon(870, 58, globalTime);

  // Mountain layers
  const mtColors = [
    { col:'#1e0a30', pts:[[0,420],[100,260],[220,190],[350,260],[480,160],[600,220],[700,180],[820,250],[960,200],[960,420]] },
    { col:'#160824', pts:[[0,440],[80,310],[200,240],[320,310],[440,200],[580,270],[680,225],[800,290],[960,250],[960,440]] },
    { col:'#0e0518', pts:[[0,540],[0,430],[160,320],[300,370],[440,290],[580,340],[700,280],[850,340],[960,300],[960,540]] },
  ];
  mtColors.forEach(({ col, pts }) => {
    ctx.fillStyle = col;
    ctx.beginPath();
    pts.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
    ctx.closePath();
    ctx.fill();
  });

  // Ground
  const grd = ctx.createLinearGradient(0, 430, 0, 540);
  grd.addColorStop(0, '#3d1a08');
  grd.addColorStop(1, '#1a0a04');
  ctx.fillStyle = grd; ctx.fillRect(0, 428, 960, 112);

  // Road/path
  ctx.fillStyle = 'rgba(80,40,15,0.6)';
  ctx.fillRect(0, 450, 960, 30);
  ctx.strokeStyle = 'rgba(255,200,80,0.3)';
  ctx.lineWidth = 2;
  ctx.setLineDash([30, 20]);
  ctx.beginPath(); ctx.moveTo(0, 465); ctx.lineTo(960, 465); ctx.stroke();
  ctx.setLineDash([]);

  // Food truck
  drawFoodTruck(68, 298);

  // Camera zone
  drawCameraZone(348, 252);

  // Couple zones
  drawCoupleZone(558, 325, 'SMOKE', mountain.smoke / 100, '#b5d4ff');
  drawCoupleZone(718, 325, 'KISS ♥', mountain.kiss / 100, '#ff9ccf');

  // Guard
  drawGuard();

  // Flash overlay on caught
  if (mountain.flashAlpha > 0) {
    ctx.fillStyle = `rgba(255,50,50,${mountain.flashAlpha * 0.35})`;
    ctx.fillRect(0, 0, 960, 540);
  }

  // HUD bars
  drawMountainHUD();
}

function drawMoon(cx, cy, t) {
  ctx.fillStyle = 'rgba(255,240,180,0.15)';
  ctx.beginPath(); ctx.arc(cx, cy, 55, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,240,180,0.08)';
  ctx.beginPath(); ctx.arc(cx, cy, 75, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff8e8';
  ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f5d090';
  ctx.beginPath(); ctx.arc(cx + 10, cy - 5, 28, 0, Math.PI * 2); ctx.fill();
}

function drawFoodTruck(x, y) {
  const done = mountain.fries && mountain.steak;
  // Body
  ctx.fillStyle = done ? '#2a4a2a' : '#fff0c9';
  ctx.fillRect(x, y, 245, 100);

  // Wheels
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x + 20, y + 92, 30, 30);
  ctx.fillRect(x + 185, y + 92, 30, 30);
  ctx.fillStyle = '#555';
  ctx.fillRect(x + 26, y + 98, 18, 18);
  ctx.fillRect(x + 191, y + 98, 18, 18);

  // Window
  ctx.fillStyle = done ? 'rgba(100,255,100,0.3)' : 'rgba(255,200,80,0.4)';
  ctx.fillRect(x + 12, y + 12, 140, 55);

  // Menu sign
  ctx.fillStyle = '#7b1730';
  ctx.fillRect(x + 18, y + 18, 128, 30);
  ctx.fillStyle = '#ffd166';
  ctx.font = 'bold 12px monospace';
  ctx.fillText('STEAK + FRIES', x + 24, y + 38);

  if (done) {
    ctx.fillStyle = '#7cff9b';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('✓ SECURED', x + 60, y + 75);
  }

  // Smoke from chimney
  for (let s = 0; s < 4; s++) {
    const sy = y - 15 - s * 18 + Math.sin(globalTime * 1.5 + s) * 5;
    const sx = x + 190 + Math.sin(globalTime + s) * 8;
    ctx.fillStyle = `rgba(180,180,200,${0.35 - s * 0.07})`;
    ctx.fillRect(sx - 6 - s * 2, sy, 12 + s * 4, 10 + s * 2);
  }
  ctx.fillStyle = '#555';
  ctx.fillRect(x + 185, y - 20, 14, 25);
}

function drawCameraZone(x, y) {
  const done = mountain.photos >= 4;
  ctx.fillStyle = done ? 'rgba(100,200,255,0.12)' : 'rgba(140,180,255,0.1)';
  ctx.fillRect(x, y, 150, 115);
  ctx.strokeStyle = done ? '#7cff9b' : '#8cc7ff';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, 150, 115);

  // Camera body
  ctx.fillStyle = done ? '#2a3a2a' : '#222';
  ctx.fillRect(x + 28, y + 20, 96, 62);
  ctx.fillStyle = '#444';
  ctx.fillRect(x + 40, y + 14, 30, 12);

  // Lens
  const lensGrad = ctx.createRadialGradient(x + 76, y + 52, 0, x + 76, y + 52, 18);
  lensGrad.addColorStop(0, '#9cd7ff');
  lensGrad.addColorStop(0.6, '#1a5580');
  lensGrad.addColorStop(1, '#111');
  ctx.fillStyle = lensGrad;
  ctx.fillRect(x + 58, y + 34, 36, 36);

  // Flash blink
  if (!done && Math.sin(globalTime * 2.5) > 0.6) {
    ctx.fillStyle = 'rgba(255,255,200,0.7)';
    ctx.fillRect(x + 96, y + 22, 18, 12);
  }

  ctx.fillStyle = done ? '#7cff9b' : '#8cc7ff';
  ctx.font = `bold 10px monospace`;
  ctx.fillText(`PHOTO ${mountain.photos}/4`, x + 20, y + 100);
}

function drawCoupleZone(x, y, label, frac, color) {
  const done = frac >= 1;
  ctx.fillStyle = done ? `${color}22` : 'rgba(255,255,255,0.04)';
  ctx.fillRect(x, y, 140, 100);
  ctx.strokeStyle = done ? color : 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, 140, 100);

  // Figures
  ctx.fillStyle = `${color}cc`;
  ctx.fillRect(x + 30, y + 20, 22, 40);  // figure 1
  ctx.fillStyle = `${color}99`;
  ctx.fillRect(x + 58, y + 20, 22, 40);  // figure 2

  // Progress bar
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x + 10, y + 72, 120, 14);
  ctx.fillStyle = color;
  ctx.fillRect(x + 10, y + 72, 120 * frac, 14);
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 10, y + 72, 120, 14);

  ctx.fillStyle = done ? '#7cff9b' : '#fff4e6';
  ctx.font = '9px monospace';
  ctx.fillText(label, x + 22, y + 14);

  if (done) {
    ctx.fillStyle = '#7cff9b';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('✓', x + 60, y + 56);
  }
}

function drawGuard() {
  const gx = mountain.guardX;
  const looking = gx > 540 && gx < 808;

  // Guard body
  ctx.fillStyle = '#0b2638';
  ctx.fillRect(gx - 1, y2(260), 38, 58);
  ctx.fillStyle = '#fff';
  ctx.fillRect(gx + 8, y2(243), 22, 22);

  // Hat
  ctx.fillStyle = '#0b2638';
  ctx.fillRect(gx + 4, y2(238), 30, 8);
  ctx.fillRect(gx + 8, y2(230), 22, 10);

  // Torch cone of light
  const coneColor = looking ? 'rgba(255,255,80,0.18)' : 'rgba(255,255,160,0.1)';
  ctx.fillStyle = coneColor;
  ctx.beginPath();
  ctx.moveTo(gx + 19, y2(270));
  const coneDir = mountain.guardDir;
  ctx.lineTo(gx + 19 + coneDir * 145, y2(218));
  ctx.lineTo(gx + 19 + coneDir * 145, y2(348));
  ctx.closePath();
  ctx.fill();

  // Flashlight highlight
  ctx.strokeStyle = `rgba(255,255,120,${looking ? 0.55 : 0.28})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(gx + 19, y2(268));
  ctx.lineTo(gx + 19 + coneDir * 150, y2(268));
  ctx.stroke();

  // Label
  ctx.fillStyle = looking ? '#ff6b6b' : 'rgba(255,255,255,0.5)';
  ctx.font = `${looking ? 'bold ' : ''}8px monospace`;
  ctx.fillText('ROP COAST GUARD', gx - 35, y2(228));
}

function y2(v) { return v; }

function drawMountainHUD() {
  // Semi-transparent panel
  ctx.fillStyle = 'rgba(5,1,12,0.72)';
  ctx.fillRect(18, 18, 185, 175);
  ctx.strokeStyle = 'rgba(255,209,102,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(18, 18, 185, 175);

  drawNeonBar(28, 28, 'LIVES',  mountain.lives / 3,     '#ff6b6b');
  drawNeonBar(28, 60, 'PHOTO',  mountain.photos / 4,    '#8cc7ff');
  drawNeonBar(28, 92, 'SMOKE',  mountain.smoke / 100,   '#b5d4ff');
  drawNeonBar(28, 124, 'KISS ♥', mountain.kiss / 100,   '#ff9ccf');

  ctx.fillStyle = mountain.fries ? '#7cff9b' : '#666';
  ctx.font = '9px monospace';
  ctx.fillText(`FRIES  ${mountain.fries ? '✓' : '·'}`, 28, 164);
  ctx.fillStyle = mountain.steak ? '#7cff9b' : '#666';
  ctx.fillText(`STEAK  ${mountain.steak ? '✓' : '·'}`, 28, 182);
}

function drawNeonBar(x, y, label, frac, color) {
  // Track
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x, y, 155, 16);

  // Fill
  const g = ctx.createLinearGradient(x, y, x + 155 * frac, y);
  g.addColorStop(0, color + 'aa');
  g.addColorStop(1, color);
  ctx.fillStyle = g;
  ctx.fillRect(x, y, 155 * frac, 16);

  // Glow effect
  if (frac > 0) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = color + '55';
    ctx.fillRect(x, y, 155 * frac, 16);
    ctx.shadowBlur = 0;
  }

  ctx.strokeStyle = color + '88';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, 155, 16);

  ctx.fillStyle = '#fff';
  ctx.font = '8px monospace';
  ctx.fillText(label, x + 162, y + 12);
}

// ─────────────────────────────────────────────
//  DRAW — LEVEL 3: CRUISE
// ─────────────────────────────────────────────
function drawCruise() {
  cruise.wave += 0.035;

  // Night sky gradient
  const sk = ctx.createLinearGradient(0, 0, 0, 260);
  sk.addColorStop(0, '#020110');
  sk.addColorStop(0.6, '#0d0428');
  sk.addColorStop(1, '#1a0935');
  ctx.fillStyle = sk; ctx.fillRect(0, 0, 960, 260);

  // Stars
  const cruiseStars = [
    [40,20],[120,45],[200,15],[310,38],[420,22],[540,40],[650,12],[760,35],[880,20],
    [65,70],[175,88],[290,65],[410,80],[520,58],[640,75],[770,60],[910,78],
    [100,110],[250,95],[380,118],[510,100],[660,108],[800,92],[930,115]
  ];
  cruiseStars.forEach(([sx, sy]) => {
    const bri = 0.4 + Math.sin(globalTime * 1.2 + sx * 0.08) * 0.4;
    ctx.fillStyle = `rgba(255,255,240,${bri})`;
    ctx.fillRect(sx, sy, sx % 3 === 0 ? 2 : 1, sx % 3 === 0 ? 2 : 1);
  });

  // Moon
  drawMoon(820, 52, globalTime);

  // Moon reflection on water
  const moonRef = ctx.createLinearGradient(780, 260, 860, 540);
  moonRef.addColorStop(0, 'rgba(255,240,180,0.12)');
  moonRef.addColorStop(1, 'rgba(255,240,180,0)');
  ctx.fillStyle = moonRef;
  ctx.fillRect(780, 260, 80, 280);

  // Mountain silhouettes
  ctx.fillStyle = '#0a0320';
  tri2(0, 260, 120, 88, 270, 260);
  tri2(650, 260, 788, 88, 960, 260);
  ctx.fillStyle = '#06021a';
  tri2(0, 260, 70, 148, 200, 260);
  tri2(750, 260, 870, 125, 960, 260);

  // Sea
  const sea = ctx.createLinearGradient(0, 260, 0, 540);
  sea.addColorStop(0, '#0d2244');
  sea.addColorStop(0.5, '#091830');
  sea.addColorStop(1, '#040c1a');
  ctx.fillStyle = sea; ctx.fillRect(0, 258, 960, 282);

  // Animated waves
  for (let wv = 0; wv < 6; wv++) {
    const alpha = 0.15 - wv * 0.02;
    ctx.strokeStyle = `rgba(140,210,255,${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let x = 0; x <= 960; x += 6) {
      const wy = 295 + wv * 38 + Math.sin((x * 0.02) + cruise.wave + wv * 0.8) * 7;
      x === 0 ? ctx.moveTo(x, wy) : ctx.lineTo(x, wy);
    }
    ctx.stroke();
  }

  // Phosphorescence sparkles on waves
  for (let sp = 0; sp < 15; sp++) {
    const spx = (sp * 67 + globalTime * 30) % 960;
    const spy = 280 + ((sp * 43) % 200) + Math.sin(globalTime + sp) * 12;
    const bri = 0.5 + Math.sin(globalTime * 3 + sp * 0.7) * 0.4;
    ctx.fillStyle = `rgba(140,255,240,${bri * 0.4})`;
    ctx.fillRect(spx, spy, 2, 2);
  }

  // Alam Palace
  drawPalace(635, 158);

  // Boats
  drawCruiseBoat(98, 350);
  if (cruise.step >= 1) drawCruiseBoat(400, 345 + Math.sin(cruise.wave) * 7);
  if (cruise.step >= 2) drawCruiseBoat(725, 330 + Math.sin(cruise.wave * 0.7) * 5);
  if (cruise.step >= 3) drawAnimHeart(790, 292, globalTime);

  // Dashed target
  const cur = cruise.steps[Math.min(cruise.step, cruise.steps.length - 1)];
  if (!levelDone && cur) drawTarget(cur);

  // Step indicator
  ctx.fillStyle = 'rgba(5,1,12,0.65)';
  ctx.fillRect(800, 18, 148, 30);
  ctx.strokeStyle = 'rgba(255,209,102,0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(800, 18, 148, 30);
  ctx.fillStyle = '#ffd166';
  ctx.font = '9px monospace';
  ctx.fillText(`MOMENT ${Math.min(cruise.step,3) + 1} / 4`, 818, 38);
}

function drawPalace(x, y) {
  // Main body
  const pGrad = ctx.createLinearGradient(x, y, x, y + 110);
  pGrad.addColorStop(0, '#e8dcc8');
  pGrad.addColorStop(1, '#c4b090');
  ctx.fillStyle = pGrad;
  ctx.fillRect(x, y + 20, 255, 100);

  // Towers
  [[x, y], [x + 215, y]].forEach(([tx, ty]) => {
    ctx.fillStyle = '#d4c4a0';
    ctx.fillRect(tx, ty + 10, 40, 110);
    ctx.fillStyle = '#a08860';
    ctx.fillRect(tx + 8, ty, 24, 14);
    // Battlements
    for (let b = 0; b < 3; b++) {
      ctx.fillStyle = '#a08860';
      ctx.fillRect(tx + b * 10, ty - 6, 8, 8);
    }
  });

  // Central dome
  ctx.fillStyle = '#b89870';
  ctx.fillRect(x + 98, y + 5, 58, 16);
  ctx.fillStyle = '#d4b888';
  ctx.fillRect(x + 104, y - 5, 46, 12);
  ctx.fillStyle = '#c8a860';
  ctx.fillRect(x + 112, y - 14, 30, 10);

  // Arch windows — glowing warm
  for (let w = 0; w < 5; w++) {
    const wx = x + 22 + w * 44;
    ctx.fillStyle = `rgba(255,220,120,${0.55 + Math.sin(globalTime * 0.4 + w * 0.8) * 0.2})`;
    ctx.fillRect(wx, y + 35, 26, 55);
    // Arch top
    ctx.fillStyle = `rgba(255,220,120,${0.45 + Math.sin(globalTime * 0.4 + w * 0.8) * 0.15})`;
    ctx.fillRect(wx + 4, y + 26, 18, 12);
  }

  // Gate
  ctx.fillStyle = '#2a1a08';
  ctx.fillRect(x + 100, y + 68, 54, 52);
  ctx.fillStyle = `rgba(255,200,80,${0.4 + Math.sin(globalTime * 0.6) * 0.15})`;
  ctx.fillRect(x + 104, y + 72, 46, 44);

  // Reflection
  ctx.fillStyle = 'rgba(255,220,120,0.06)';
  ctx.fillRect(x, y + 120, 255, 40);

  // Label
  ctx.fillStyle = 'rgba(255,220,120,0.8)';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('ALAM PALACE  عالم', x + 52, y + 140);
}

function drawCruiseBoat(x, y) {
  // Hull
  const hGrad = ctx.createLinearGradient(x, y, x, y + 32);
  hGrad.addColorStop(0, '#f0f0f0');
  hGrad.addColorStop(1, '#c0c8d8');
  ctx.fillStyle = hGrad;
  ctx.fillRect(x, y, 100, 30);

  // Cabin
  ctx.fillStyle = '#e8eef5';
  ctx.fillRect(x + 20, y - 22, 55, 24);
  // Cabin windows
  ctx.fillStyle = `rgba(180,230,255,0.8)`;
  ctx.fillRect(x + 26, y - 18, 14, 12);
  ctx.fillRect(x + 46, y - 18, 14, 12);

  // Waterline stripe
  ctx.fillStyle = '#1a4080';
  ctx.fillRect(x - 5, y + 28, 110, 5);

  // Bow wake
  ctx.strokeStyle = 'rgba(200,240,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x + 100, y + 16);
  ctx.lineTo(x + 130, y + 10 + Math.sin(cruise.wave) * 3);
  ctx.stroke();
}

function drawAnimHeart(x, y, t) {
  const scale = 1 + Math.sin(t * 3) * 0.2;
  ctx.save();
  ctx.translate(x + 20, y + 20);
  ctx.scale(scale, scale);
  ctx.translate(-20, -20);

  const rg = ctx.createRadialGradient(20, 24, 0, 20, 24, 28);
  rg.addColorStop(0, '#ff85a1');
  rg.addColorStop(0.6, '#c9184a');
  rg.addColorStop(1, '#8b1a4a');
  ctx.fillStyle = rg;

  // Pixel heart
  [[8,4],[24,4],[4,8],[8,8],[16,8],[24,8],[28,8],[4,12],[8,12],[12,12],[16,12],[20,12],[24,12],[28,12],[8,16],[12,16],[16,16],[20,16],[24,16],[12,20],[16,20],[20,20],[16,24]].forEach(([hx, hy]) => {
    ctx.fillRect(hx, hy, 4, 4);
  });

  // Sparkles
  for (let s = 0; s < 6; s++) {
    const sa = (s / 6) * Math.PI * 2 + t * 2;
    const sr = 28 + Math.sin(t * 2.5 + s) * 8;
    ctx.fillStyle = `rgba(255,180,200,${0.6 + Math.sin(t * 3 + s) * 0.4})`;
    ctx.fillRect(20 + Math.cos(sa) * sr - 2, 24 + Math.sin(sa) * sr - 2, 3, 3);
  }
  ctx.restore();
}

function drawTarget(box) {
  if (!box || levelDone) return;
  const alpha = 0.5 + Math.sin(globalTime * 4) * 0.4;
  ctx.strokeStyle = `rgba(255,209,102,${alpha})`;
  ctx.lineWidth = 3;
  ctx.setLineDash([10, 6]);
  ctx.strokeRect(box.x, box.y, box.w, box.h);
  ctx.setLineDash([]);

  // Corner accents
  const corners = [[box.x, box.y], [box.x + box.w, box.y], [box.x, box.y + box.h], [box.x + box.w, box.y + box.h]];
  ctx.strokeStyle = `rgba(255,209,102,${alpha * 1.2})`;
  ctx.lineWidth = 3;
  corners.forEach(([cx, cy], i) => {
    const dx = i % 2 === 0 ? 1 : -1;
    const dy = i < 2 ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(cx, cy + dy * 14);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx + dx * 14, cy);
    ctx.stroke();
  });
}

// ─────────────────────────────────────────────
//  WIN + HELPERS
// ─────────────────────────────────────────────
function winLevel(text) {
  levelDone = true;
  stopLoop();
  popupTitle.textContent = `LEVEL ${currentLevel} CLEARED ♥`;
  popupText.textContent  = text;
  popup.classList.remove('hidden');
}

function point(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / rect.width  * canvas.width,
    y: (e.clientY - rect.top)  / rect.height * canvas.height
  };
}

function inside(p, box) {
  return p.x >= box.x && p.x <= box.x + box.w && p.y >= box.y && p.y <= box.y + box.h;
}

function distance(x1, y1, x2, y2) { return Math.hypot(x1 - x2, y1 - y2); }

function tri2(x1, y1, x2, y2, x3, y3) {
  ctx.beginPath();
  ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x3, y3);
  ctx.closePath(); ctx.fill();
}

updateMenu();
</script>
